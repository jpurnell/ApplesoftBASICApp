name: ApplesoftBASICApp
options:
  bundleIdPrefix: com.justinpurnell
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "17.0"

packages:
  ApplesoftBASIC:
    url: https://github.com/jpurnell/ApplesoftBASIC.git
    branch: main

targets:
  ApplesoftBASICApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: ViewModels
      - path: Views
      - path: IO
      - path: Theme
      - path: Sound
      - path: Terminal
      - path: Resources/Fonts
        type: folder
        buildPhase: resources
      - path: Resources/Samples
        type: folder
        buildPhase: resources
      - path: Resources/Assets.xcassets
    dependencies:
      - package: ApplesoftBASIC
        product: ApplesoftBASICLib
    info:
      path: Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Fonts/PrintChar21.ttf
          - Fonts/PRNumber3.ttf
    settings:
      base:
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.justinpurnell.ApplesoftBASIC
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MAC_DESIGNED_FOR_IPAD: YES
