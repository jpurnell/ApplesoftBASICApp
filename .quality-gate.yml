enabledCheckers:
  - test
  - safety
  - doc-lint
  - doc-coverage
  - unreachable
  - recursion
  - concurrency
  - pointer-escape
  - memory-builder
  - accessibility
  - status
  - swift-version
  - logging
  - test-quality
  - context
  - dependency-audit
  - release-readiness
  - fp-safety
  - stochastic-determinism
  - memory-lifecycle
  - mcp-readiness
  - process-safety
  - complexity
  - hig-auditor
  - appintents-readiness
  - consistency
  - xcode-build

# This is an iPad app (SDKROOT=iphoneos, TARGETED_DEVICE_FAMILY=2), so the
# unreachable checker's cross-module pass needs a fresh Xcode index store.
# Auto-build refreshes it before analysis; without a matching destination,
# xcodebuild defaults to macOS and falls back to mismatched iPhone simulators,
# which fails the build and silently skips cross-module reachability.
unreachableAutoBuildXcode: true
xcodeDestination: "generic/platform=iOS Simulator"

consistency:
  corpusPath: /Users/jpurnell/Dropbox/Computer/Development/Swift/Tools/org-judgement-corpus
  projectID: ApplesoftBASICApp
  consistencyThreshold: 0.7
  defaultRiskTier: 2

ijs:
  projectID: "ApplesoftBASICApp"
  corpusPath: "/Users/jpurnell/Dropbox/Computer/Development/Swift/Tools/org-judgement-corpus"
  decisionOwner: "jpurnell"
  defaultRiskTier: 2
  remoteURL: "git@github.com:jpurnell/org-judgement-corpus.git"
